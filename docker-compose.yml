services:

  # ─── Semantic Cache API ────────────────────────────────────────────────────
  api:
    build: .
    container_name: semantic-cache-api
    ports:
      - "8000:8000"
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      redis:
        condition: service_healthy

  # ─── Redis Stack (RediSearch + RedisJSON → RedisVL-compatible) ────────────
  redis:
    image: redis/redis-stack:latest
    container_name: semantic-cache-redis
    ports:
      - "6379:6379"   # Redis
      - "8001:8001"   # RedisInsight UI
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: semantic-cache-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

  # ─── Mock LLM (benchmark profile only) ───────────────────────────────────
  # Start with: docker compose --profile benchmark up -d
  # Then add to .env: OPENAI_BASE_URL=http://mock-llm:9999/v1
  mock-llm:
    build: .
    container_name: semantic-cache-mock-llm
    command: uvicorn scripts.mock_llm:app --host 0.0.0.0 --port 9999
    ports:
      - "9999:9999"
    profiles:
      - benchmark
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9999/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: semantic-cache-grafana
    ports:
      - "3000:3000"
    environment:
      # Admin credentials (change before exposing publicly)
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      # Anonymous viewer access — reviewers land on the dashboard with no login
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      # Open directly to the semantic-cache dashboard
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/dashboards/semantic-cache.json
      # Silence the update check noise in logs
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboard.json:/etc/grafana/dashboards/semantic-cache.json:ro
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
    depends_on:
      - prometheus

volumes:
  redis_data:
  prometheus_data:
  grafana_data:
