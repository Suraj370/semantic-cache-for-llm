services:
  eval:
    build: .
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6334"
    volumes:
      - ./output:/app/output
    depends_on:
      - qdrant

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"   # REST / dashboard
      - "6334:6334"   # gRPC (used by the cache)
    volumes:
      - qdrant_data:/qdrant/storage

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=1d"
    depends_on:
      - qdrant

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
      # auto-load both dashboards from the host
      - ./observability/dashboard.json:/var/lib/grafana/dashboards/cache_dashboard.json
      - ./observability/eval_dashboard.json:/var/lib/grafana/dashboards/eval_dashboard.json
    depends_on:
      - prometheus

volumes:
  qdrant_data:
  grafana_data:
